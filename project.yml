name: Wrapsweeper

options:
  bundleIdPrefix: fi.misaki
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  WrapsweeperCore:
    path: Packages/WrapsweeperCore

targets:
  Wrapsweeper-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/iOS
      - path: Sources/Shared
    info:
      path: Sources/iOS/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fi.misaki.wrapsweeper
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: WrapsweeperCore
        product: WrapsweeperKit

  Wrapsweeper-macOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/macOS
      - path: Sources/Shared
    info:
      path: Sources/macOS/Info.plist
      properties:
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fi.misaki.wrapsweeper
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: WrapsweeperCore
        product: WrapsweeperKit
